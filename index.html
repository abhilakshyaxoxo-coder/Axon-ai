<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXON | Cinematic Academic Narratives</title>
    <style>
        /* --- RESEARCH-BACKED COLOR PALETTE --- */
        :root[data-theme="light"] {
            --bg: #F8FAFC;
            --card-bg: #FFFFFF;
            --text: #003366; /* RPTH Deep Blue - Trust Score > 10 */
            --accent: #FFC325; /* High-contrast Yellow */
            --secondary: #64748B;
            --border: #E2E8F0;
            --shadow: rgba(0, 51, 102, 0.1);
        }

        :root[data-theme="dark"] {
            --bg: #0F172A;
            --card-bg: #1E293B;
            --text: #F1F5F9;
            --accent: #FFC325;
            --secondary: #94A3B8;
            --border: #334155;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background 0.3s ease, color 0.3s ease;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- NAVIGATION --- */
        nav {
            width: 100%;
            max-width: 800px;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: -1px; }

        #theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 0.6rem;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 6px var(--shadow);
        }

        /* --- MAIN CONTAINER --- */
        .container {
            width: 90%;
            max-width: 600px;
            flex-grow: 1;
            margin-top: 3rem;
            text-align: center;
        }

        header h1 { font-size: 2.5rem; margin-bottom: 0.5rem; line-height: 1.1; }
        .accent { color: var(--accent); }
        header p { color: var(--secondary); margin-bottom: 2.5rem; }

        /* --- INPUT CARD --- */
        .input-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 15px 30px var(--shadow);
            text-align: left;
        }

        .field { margin-bottom: 1.2rem; }
        label { display: block; font-weight: 700; font-size: 0.8rem; margin-bottom: 0.4rem; color: var(--secondary); }

        input, select {
            width: 100%;
            padding: 0.8rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        #generate-btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            background: var(--text);
            color: var(--bg);
            font-weight: 800;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
        }

        #generate-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* --- OUTPUT AREA --- */
        #output-area {
            margin-top: 2.5rem;
            padding: 1.5rem;
            background: var(--card-bg);
            border-radius: 15px;
            border-left: 4px solid var(--accent);
            text-align: left;
            display: none;
            box-shadow: 0 10px 20px var(--shadow);
            white-space: pre-wrap;
        }

        .loader {
            display: none;
            margin: 2rem auto;
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 30px; height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- FOOTER --- */
        footer {
            padding: 2rem;
            color: var(--secondary);
            font-size: 0.85rem;
            font-weight: 500;
        }

        @media (max-width: 500px) {
            header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">AXON</div>
        <button id="theme-toggle"><span id="theme-icon">🌙</span></button>
    </nav>

    <main class="container">
        <header>
            <h1>Academic Topics,<br><span class="accent">Cinematic Soul.</span></h1>
            <p>Powered by Llama 4 Maverick</p>
        </header>

        <section class="input-card">
            <div class="field">
                <label>RESEARCH TOPIC</label>
                <input type="text" id="topic-input" placeholder="e.g. Quantum Entanglement">
            </div>

            <div class="field">
                <label>NARRATIVE TONE</label>
                <select id="tone-input">
                    <option value="Epic">Epic/Orchestral</option>
                    <option value="Gritty Noir">Gritty Noir</option>
                    <option value="Sci-Fi Thriller">Sci-Fi Thriller</option>
                    <option value="Whimsical Pixar-style">Whimsical Pixar-style</option>
                </select>
            </div>

            <button id="generate-btn">GENERATE PITCH</button>
        </section>

        <div class="loader" id="loader"></div>

        <section id="output-area"></section>
    </main>

    <footer>
        Developed by Abhi Lakshya &copy; 2026
    </footer>

    <script>
        const html = document.documentElement;
        const themeBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const generateBtn = document.getElementById('generate-btn');
        const outputArea = document.getElementById('output-area');
        const loader = document.getElementById('loader');

        // Theme Toggle
        themeBtn.addEventListener('click', () => {
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            themeIcon.textContent = isDark ? '🌙' : '☀️';
        });

        // ML Brain Connection
        generateBtn.addEventListener('click', async () => {
            const topic = document.getElementById('topic-input').value;
            const tone = document.getElementById('tone-input').value;

            if (!topic) return alert("Enter a topic first!");

            // UI State: Loading
            generateBtn.disabled = true;
            generateBtn.innerText = "THINKING...";
            outputArea.style.display = 'none';
            loader.style.display = 'block';

            try {
                // Connecting to Netlify Function Brain
                const response = await fetch('/.netlify/functions/generate-pitch', {
                    method: 'POST',
                    body: JSON.stringify({ topic, tone })
                });

                const data = await response.json();
                
                loader.style.display = 'none';
                outputArea.style.display = 'block';
                outputArea.innerText = data.pitch || "Error: Could not reach Llama 4.";
            } catch (err) {
                loader.style.display = 'none';
                alert("Connection failed. Check your Netlify logs!");
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerText = "GENERATE PITCH";
            }
        });
    </script>
</body>
</html>
