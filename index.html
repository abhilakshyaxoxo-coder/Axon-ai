<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axion-AI • Cinematic Screenwriter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- CORE STYLES (Research-Based Palette) --- */
        :root {
            /* DARK THEME (Default) - Stability & Tech */
            --bg-primary: #0A0A0C;
            --bg-secondary: #141417;
            --bg-card: rgba(20, 20, 23, 0.8);
            --text-primary: #FFFFFF;
            --text-secondary: #A1A1AA;
            --accent: #0A84FF; /* The "Trust Blue" */
            --accent-glow: #0A84FF33;
            --accent-hover: #3FA9FF;
            --error: #FF453A;
            --success: #32D74B;
            --border: #27272A;
            --font-family: 'Inter', -apple-system, sans-serif;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* LIGHT THEME (User Toggle) - Clean & Pleasant */
        [data-theme="light"] {
            --bg-primary: #F4F4F5;
            --bg-secondary: #FFFFFF;
            --bg-card: rgba(255, 255, 255, 0.9);
            --text-primary: #09090B;
            --text-secondary: #71717A;
            --accent: #007AFF; /* The standard "Apple Blue" */
            --accent-glow: #007AFF1A;
            --accent-hover: #0056B3;
            --border: #E4E4E7;
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        /* --- RESET & LAYOUT --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-family);
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: var(--transition);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            width: 100%;
            flex-grow: 1;
        }

        /* --- HEADER & THEME TOGGLE --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            background-color: var(--bg-card);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--text-primary);
            letter-spacing: -0.05em;
        }
        .logo span { color: var(--accent); }

        #theme-toggle {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.25rem;
            padding: 0.5rem;
            border-radius: 0.5rem;
            transition: var(--transition);
        }
        #theme-toggle:hover { background-color: var(--border); color: var(--accent); }

        /* --- MAIN INPUT AREA --- */
        main {
            padding: 2rem 0;
            display: grid;
            gap: 1.5rem;
        }

        .input-group {
            background-color: var(--bg-secondary);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .label {
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-family: var(--font-family);
            font-size: 1rem;
            transition: var(--transition);
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* --- STUNNING BUTTON --- */
        #generate-btn {
            width: 100%;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            background-color: var(--accent);
            color: #FFFFFF;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 14px 0 var(--accent-glow);
            letter-spacing: -0.02em;
        }
        #generate-btn:hover { background-color: var(--accent-hover); transform: translateY(-2px); }
        #generate-btn:disabled {
            background-color: var(--border);
            color: var(--text-secondary);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* --- RESULT / OUTPUT AREA --- */
        #result {
            background-color: var(--bg-card);
            border-radius: 1rem;
            padding: 2rem;
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 1rem;
            line-height: 1.6;
            min-height: 150px;
            box-shadow: var(--shadow-lg);
            transition: var(--transition);
            /* A subtle "glow" around the output */
            position: relative;
            overflow: hidden;
        }
        #result::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background-color: var(--accent);
        }
        #result.loading { color: var(--accent); font-weight: 600; }
        #result.error { color: var(--error); }

        /* --- FOOTER --- */
        footer {
            text-align: center;
            padding: 2rem 1.5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            border-top: 1px solid var(--border);
        }
        footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
        footer a:hover { text-decoration: underline; }

    </style>
</head>
<body data-theme="dark">
    <header>
        <div class="logo"><span>Axion</span>-AI</div>
        <button id="theme-toggle" aria-label="Toggle light/dark mode">◐</button>
    </header>

    <div class="container">
        <main>
            <div class="input-group">
                <label for="topic" class="label">Movie Topic</label>
                <input type="text" id="topic" placeholder="e.g., A dystopian city with no sound" required>
            </div>

            <div class="input-group">
                <label for="tone" class="label">Cinematic Tone</label>
                <select id="tone" required>
                    <option value="Action">Action</option>
                    <option value="Drama">Drama</option>
                    <option value="Sci-Fi">Sci-Fi</option>
                    <option value="Horror">Horror</option>
                    <option value="Epic">Epic</option>
                    <option value="Thriller">Thriller</option>
                    <option value="Suspense">Suspense</option>
                    <option value="Comedy">Comedy</option>
                </select>
            </div>

            <button id="generate-btn">Generate Pitch</button>

            <div id="result">Your movie pitch will appear here...</div>
        </main>
    </div>

    <footer>
        <p>Built for social commentary & deep dives. Powered by **Mistral-7B**.</p>
        <p>A project by <a href="#">Abhilakshya</a></p>
    </footer>

    <script>
        // --- 1. Dark/Light Mode Toggle Logic ---
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;

        themeToggle.addEventListener('click', () => {
            if (body.getAttribute('data-theme') === 'dark') {
                body.setAttribute('data-theme', 'light');
                themeToggle.innerText = '◑'; // Change icon
            } else {
                body.setAttribute('data-theme', 'dark');
                themeToggle.innerText = '◐';
            }
        });

        // --- 2. Existing AI Logic (IDs kept from last version) ---
        async function generatePitch() {
            const topic = document.getElementById('topic').value;
            const tone = document.getElementById('tone').value;
            const resultDiv = document.getElementById('result');
            const generateBtn = document.getElementById('generate-btn');

            if (!topic) {
                resultDiv.innerText = "Error: Please enter a topic.";
                return;
            }

            // UI feedback
            resultDiv.innerText = "Axion Engine is thinking...";
            resultDiv.classList.add('loading');
            resultDiv.classList.remove('error');
            generateBtn.disabled = true;

            try {
                // Call the Netlify function
                const response = await fetch('/.netlify/functions/generate-pitch', {
                    method: 'POST',
                    body: JSON.stringify({ topic, tone })
                });

                const data = await response.json();

                resultDiv.classList.remove('loading');

                if (data.pitch) {
                    resultDiv.innerText = data.pitch;
                } else {
                    // Update error text to avoid "Llama"
                    resultDiv.classList.add('error');
                    resultDiv.innerText = "Axion Engine Error: " + (data.error || "Please check Netlify Function logs.");
                }
            } catch (err) {
                resultDiv.classList.remove('loading');
                resultDiv.classList.add('error');
                resultDiv.innerText = "Connection Failed. Check Netlify Logs.";
            } finally {
                generateBtn.disabled = false;
            }
        }

        // Add event listener to the button
        document.getElementById('generate-btn').addEventListener('click', generatePitch);
    </script>
</body>
</html>
